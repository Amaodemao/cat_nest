server {
    listen 80;
    listen [::]:80;
    server_name amao.hnbai.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amao.hnbai.com;

    # Keep the certificate directives from the existing amao.hnbai.com server block.
    ssl_certificate /etc/letsencrypt/live/amao.hnbai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amao.hnbai.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }
}
